<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="style.css" type="text/css" />
    <title>Negotiator</title>
    <script src="script/table.js"></script>
    <script src="script/shared.js"></script>
</head>
<body id="popupBody">
    <header id="mainpanel">
        <a href="options.html#rules" class="button" target="_blank">Rules</a>
        <a href="options.html#tracked" class="button" target="_blank">Tracked</a>
        <span class="grow"></span>
        <button class="button" id="clearTrackedReload">Clear</button>
    </header>
    <main>
        <h1>Tracked</h1>

        <div class="table" id="tracked">
            <div>
                <div></div>
                <div>From</div>
                <div></div>
                <div>To</div>
                <div style="grid-column: span 2">Action</div>
            </div>
            <div class="rows" id="tracked-rows">

            </div>
        </div>

        <h1>Rules</h1>

        <div class="table" id="rules">
            <div class="header">
                <div></div>
                <div>From</div>
                <div></div>
                <div>To</div>
                <div>Action</div>
                <div>Delete</div>
            </div>
            <div class="rows" id="rules-rows">

            </div>
        </div>
    </main>

    <template id="row-template">
        <form>
            <button type="button" class="fromWild">➤</button>
            <input type="text" class="from" pattern="\*|\*\.?[a-zA-Z0-9.\-]+" placeholder="*.example.com or *" title="*.example.com or *" />
            <button type="button" class="toWild">➤</button>
            <input type="text" class="to" pattern="\*|\*\.?[a-zA-Z0-9.\-]+" placeholder="*.example.com or *" title="*.example.com or *" />
            <select class="actionType">
                <option value="allow">Allow</option>
                <option value="modifyHeaders">Headers</option>
                <!--
                <option value="redirect">Redirect</option>
                -->
                <option value="block">Block</option>
            </select>
            <button type="submit" class="add">Add</button>
            <button type="button" class="delete danger">
                <svg style="height: 1em" viewBox="0 -960 960 960"><path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z" /></svg>
            </button>
            <div class="modifyHeaders">
                <div class="header">
                    <div>
                        <div>Request Header</div>
                        <div>Operation</div>
                        <div>Value</div>
                        <button type="button" class="addRequestHeader">+</button>
                    </div>
                </div>
                <div class="modifyHeadersRequestRows"></div>
                <div class="header">
                    <div>
                        <div>Response Header</div>
                        <div>Operation</div>
                        <div>Value</div>
                        <button type="button" class="addResponseHeader">+</button>
                    </div>
                </div>
                <div class="modifyHeadersResponseRows"></div>
            </div>
        </form>
    </template>

    <template id="modifyHeaders-template">
        <div>
            <input type="text" class="header" />
            <select class="operation">
                <option value="remove">Remove</option>
                <option value="set">Set</option>
                <option value="append">Append</option>
            </select>
            <input type="text" class="value" />
            <button type="button" class="delete danger">
                <svg style="height: 1em" viewBox="0 -960 960 960"><path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z" /></svg>
            </button>
        </div>
    </template>

</body>
</html>
