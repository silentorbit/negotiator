<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="style.css" type="text/css" />
    <title>Negotiator</title>
    <script src="script/table.js"></script>
    <script src="script/shared.js"></script>
</head>
<body>
    <header id="mainpanel">
        <a href="options.html#rules" class="button">Rules</a>
        <a href="options.html#tracked" class="button">Tracked</a>
        <span class="grow"></span>
        <button class="button" id="clearTrackedReload">Clear</button>
    </header>
    <main id="rules-tab" class="tab hidden">

        <h1>Rules</h1>

        <div class="table" id="rules">
            <div class="header">
                <div></div>
                <div>From</div>
                <div></div>
                <div>To</div>
                <div>Action</div>
                <div>Delete</div>
            </div>
            <div class="rows" id="rules-rows">

            </div>
        </div>
    </main>
    
    <main id="tracked-tab" class="tab hidden">

        <h1>Tracked</h1>

        <div class="table" id="tracked">
            <div class="header">
                <div></div>
                <div>From</div>
                <div></div>
                <div>To</div>
                <div style="grid-column: span 2">Action</div>
            </div>
            <div class="rows" id="tracked-rows">

            </div>
        </div>

    </main>
    
    <!-- Templates -->
    <div style="display: none;">

        <div id="filterHeader" class="header">
            <span>From</span>
            <span>To</span>
            <span>Track &amp; Action</span>
        </div>

        <form id="filterTemplate">
            <div><button id="fromWild">➤</button></div>
            <input type="text" id="from" value="" placeholder="From domain..." />
            <div><button id="toWild">➤</button></div>
            <input type="text" id="to" value="" placeholder="To domain..." />
            <div><input type="checkbox" id="track" title="Track" /></div>
            <select id="filter"></select>
            <input type="submit" id="add" value="Add" class="button" />
            <div><input type="button" id="del" value="delete" class="dangerButton" /></div>
        </form>
    </div>

    <template id="row-template">
        <form>
            <button type="button" id="fromWild">➤</button>
            <input type="text" id="from" value="" placeholder="From domain..." />
            <button type="button" id="toWild">➤</button>
            <input type="text" id="to" value="" placeholder="To domain..." />
            <select id="actionType">
                <option value="allow">Allow</option>
                <!--
                <option value="modifyHeaders">Headers</option>
                <option value="redirect">Redirect</option>
                -->
                <option value="block">Block</option>
            </select>
            <button type="submit" id="add">Add</button>
            <button type="button" id="delete" class="danger">
                <svg style="height: 1em" viewBox="0 -960 960 960"><path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z" /></svg>
            </button>
        </form>
    </template>
</body>
</html>
